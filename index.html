<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>磐销云输入法</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, 'PingFang SC', 'SF Pro Display', system-ui, sans-serif;
    }
    .phone {
      width: 375px;
      min-height: 100vh;
      background: #3D6EF5;
      position: relative;
      overflow: hidden;
    }
    /* Status bar */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 24px 0;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
    }
    .status-icons {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .status-icons svg { width: 16px; height: 16px; }
    /* Slogan */
    .slogan {
      position: absolute;
      top: 35%;
      left: 0;
      width: 100%;
      text-align: center;
      color: #fff;
      font-size: 26px;
      line-height: 1.6;
      font-weight: 400;
    }
    /* Mascot */
    .mascot {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 375px;
    }
    @media (max-width: 430px) { .phone { width: 100%; } }
  </style>
</head>
<body>
  <div class="phone">
    <div class="status-bar">
      <span>9:41</span>
      <div class="status-icons">
        <svg viewBox="0 0 16 16" fill="white"><path d="M1 10h2v4H1zM5 7h2v7H5zM9 4h2v10H9zM13 1h2v13h-2z"/></svg>
        <svg viewBox="0 0 16 16" fill="white"><path d="M8 3C5.5 3 3.3 4 1.7 5.7l1.4 1.4C4.5 5.7 6.2 5 8 5s3.5.7 4.9 2.1l1.4-1.4C12.7 4 10.5 3 8 3zm0 4c-1.5 0-2.8.6-3.8 1.5L5.6 10c.7-.7 1.5-1 2.4-1s1.7.3 2.4 1l1.4-1.5C10.8 7.6 9.5 7 8 7zm0 4c-.6 0-1.1.2-1.5.6L8 13.5l1.5-1.9c-.4-.4-.9-.6-1.5-.6z"/></svg>
        <svg viewBox="0 0 24 16" fill="white"><rect x="0" y="2" width="20" height="12" rx="2" stroke="white" stroke-width="1.5" fill="none"/><rect x="2" y="4" width="14" height="8" rx="1" fill="white"/><rect x="21" y="5" width="3" height="6" rx="1" fill="white" opacity="0.4"/></svg>
      </div>
    </div>

    <div class="slogan">
      每一句对话，<br>都在走向成交
    </div>

    <img class="mascot" src="assets/mascot.png" alt="磐销吉祥物">
  </div>

  <script>
    setTimeout(function() { location.href = 'login.html'; }, 2000);
  </script>
</body>
</html>
