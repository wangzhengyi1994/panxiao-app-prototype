<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>磐销云输入法 - 注册</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; justify-content: center; min-height: 100vh; align-items: center; }
    .phone-frame { position: relative; width: 390px; max-width: 100vw; }
    .screen-img { width: 100%; display: block; }
    .hotspot { position: absolute; cursor: pointer; }
    @media (max-width: 430px) { .phone-frame { width: 100vw; } }
  </style>
</head>
<body>
  <div class="phone-frame">
    <img class="screen-img" src="assets/register.png">
    <!-- 获取验证码 -->
    <div class="hotspot" style="top:41%;left:70%;width:22%;height:4%;"></div>
    <!-- 登录(注册)按钮 -->
    <div class="hotspot" style="top:64%;left:8%;width:84%;height:6%;" onclick="location.href='recommend1.html'"></div>
    <!-- 去登录 -->
    <div class="hotspot" style="top:71.5%;left:40%;width:25%;height:4%;" onclick="location.href='login.html'"></div>
  </div>
</body>
</html>
