<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>磐销云输入法 - 选择行业</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; justify-content: center; min-height: 100vh; align-items: center; }
    .phone-frame { position: relative; width: 390px; max-width: 100vw; }
    .screen-img { width: 100%; display: block; }
    .hotspot { position: absolute; cursor: pointer; }
    @media (max-width: 430px) { .phone-frame { width: 100vw; } }
  </style>
</head>
<body>
  <div class="phone-frame">
    <img class="screen-img" src="assets/recommend1.png">
    <!-- 底部蓝色按钮区域 -->
    <div class="hotspot" style="top:92%;left:3%;width:94%;height:5.5%;" onclick="location.href='recommend2.html'"></div>
  </div>
</body>
</html>
