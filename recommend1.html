<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>磐销云输入法 - 选择行业</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, 'PingFang SC', 'SF Pro Display', system-ui, sans-serif;
    }
    .phone {
      width: 375px;
      min-height: 100vh;
      background: #F5F5F5;
      position: relative;
      display: flex;
      flex-direction: column;
    }
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 24px 0;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
    }
    .status-icons { display: flex; gap: 6px; align-items: center; }
    .status-icons svg { width: 16px; height: 16px; }

    .header {
      background: linear-gradient(180deg, #1B6EF3, #1558D6);
      height: 220px;
      border-radius: 0 0 30px 30px;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
      padding: 50px 20px 20px;
    }
    .back-btn {
      position: absolute;
      top: 50px;
      left: 16px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      z-index: 5;
    }
    .back-btn svg { width: 24px; height: 24px; }

    .progress-bar {
      display: flex;
      gap: 6px;
      margin-top: 16px;
      margin-bottom: 20px;
      padding: 0 30px;
    }
    .progress-bar .seg {
      flex: 1;
      height: 3px;
      border-radius: 2px;
      background: rgba(255,255,255,0.4);
    }
    .progress-bar .seg.active { background: #fff; }

    .header-text {
      position: absolute;
      bottom: 30px;
      left: 20px;
    }
    .header-text h1 {
      color: #fff;
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 6px;
    }
    .header-text p {
      color: #fff;
      font-size: 15px;
      opacity: 0.9;
    }
    .header-character {
      position: absolute;
      right: -10px;
      bottom: 0;
      height: 160px;
    }

    .search-wrap {
      background: #F5F5F7;
      border-radius: 10px;
      height: 44px;
      margin: 16px 20px 0;
      display: flex;
      align-items: center;
      padding: 0 12px;
    }
    .search-wrap svg { width: 18px; height: 18px; color: #999; margin-right: 8px; flex-shrink: 0; }
    .search-wrap input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-size: 14px;
      color: #1A1A1A;
      font-family: inherit;
    }
    .search-wrap input::placeholder { color: #AAAAAA; }

    .scroll-area {
      flex: 1;
      overflow-y: auto;
      padding-bottom: 80px;
    }
    .category-title {
      font-size: 15px;
      font-weight: 600;
      color: #333;
      margin: 16px 20px 8px;
    }
    .tag-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 0 20px;
    }
    .tag {
      height: 38px;
      background: #F5F5F7;
      border-radius: 8px;
      border: 1px solid transparent;
      font-size: 14px;
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
    }
    .tag:active { transform: scale(0.97); }
    .tag.active {
      background: #DDEEFF;
      border-color: #1B6EF3;
      color: #1B6EF3;
    }

    .other-section {
      padding: 0 20px;
      position: relative;
    }
    .other-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .add-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #3D6EF5;
      border: none;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .add-custom {
      width: 100%;
      height: 44px;
      border: 2px dashed #CCC;
      border-radius: 10px;
      background: transparent;
      color: #999;
      font-size: 14px;
      cursor: pointer;
      margin-top: 8px;
      font-family: inherit;
    }

    .bottom-btn {
      position: fixed;
      bottom: 0;
      width: 375px;
      padding: 12px 20px 28px;
      background: #fff;
    }
    .bottom-btn button {
      width: 100%;
      height: 52px;
      background: #3D6EF5;
      border: none;
      border-radius: 14px;
      color: #FFF;
      font-size: 18px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
    }
    .bottom-btn button:active { opacity: 0.85; }

    @media (max-width: 430px) {
      .phone { width: 100%; }
      .bottom-btn { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="status-bar">
      <span>9:41</span>
      <div class="status-icons">
        <svg viewBox="0 0 16 16" fill="white"><path d="M1 10h2v4H1zM5 7h2v7H5zM9 4h2v10H9zM13 1h2v13h-2z"/></svg>
        <svg viewBox="0 0 16 16" fill="white"><path d="M8 3C5.5 3 3.3 4 1.7 5.7l1.4 1.4C4.5 5.7 6.2 5 8 5s3.5.7 4.9 2.1l1.4-1.4C12.7 4 10.5 3 8 3zm0 4c-1.5 0-2.8.6-3.8 1.5L5.6 10c.7-.7 1.5-1 2.4-1s1.7.3 2.4 1l1.4-1.5C10.8 7.6 9.5 7 8 7zm0 4c-.6 0-1.1.2-1.5.6L8 13.5l1.5-1.9c-.4-.4-.9-.6-1.5-.6z"/></svg>
        <svg viewBox="0 0 24 16" fill="white"><rect x="0" y="2" width="20" height="12" rx="2" stroke="white" stroke-width="1.5" fill="none"/><rect x="2" y="4" width="14" height="8" rx="1" fill="white"/><rect x="21" y="5" width="3" height="6" rx="1" fill="white" opacity="0.4"/></svg>
      </div>
    </div>

    <div class="header">
      <button class="back-btn" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <div class="progress-bar">
        <div class="seg active"></div>
        <div class="seg"></div>
        <div class="seg"></div>
        <div class="seg"></div>
      </div>
      <div class="header-text">
        <h1>选择您的赛道</h1>
        <p>您目前深耕于哪个行业？</p>
      </div>
      <img class="header-character" src="assets/login_character.png" alt="3D人物">
    </div>

    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" placeholder="搜索行业" id="searchInput" oninput="filterTags()">
    </div>

    <div class="scroll-area" id="scrollArea"></div>

    <div class="bottom-btn">
      <button onclick="location.href='recommend2.html'">下一步</button>
    </div>
  </div>

  <script>
    var categories = {
      '金融销售': ['助贷', '个贷', '保险', '理财', '证券', '信用卡'],
      '服务业销售': ['家装', '服装', '旅游', '全屋定制', '彩妆', '健身', '美容', '珠宝', '护肤品'],
      '房地产销售': ['地产中介', '置业顾问'],
      '教培销售': ['招生', '课程', '留学'],
      '汽车销售': ['二手车', '车险', '汽车', '汽车配件'],
      '医疗销售': ['大健康', '医疗器械', '医药', '口腔', '医美'],
      '广告/会展销售': ['媒介广告', '会展会议']
    };

    var selected = new Set(['助贷']);

    function renderCategories(filter) {
      var area = document.getElementById('scrollArea');
      area.innerHTML = '';
      var fl = (filter || '').toLowerCase();

      for (var cat in categories) {
        var tags = categories[cat];
        if (fl) {
          tags = tags.filter(function(t) { return t.toLowerCase().indexOf(fl) >= 0; });
          if (!tags.length && cat.toLowerCase().indexOf(fl) < 0) continue;
          if (!tags.length) tags = categories[cat];
        }

        var h = document.createElement('div');
        h.className = 'category-title';
        h.textContent = cat;
        area.appendChild(h);

        var grid = document.createElement('div');
        grid.className = 'tag-grid';
        tags.forEach(function(tag) {
          var d = document.createElement('div');
          d.className = 'tag' + (selected.has(tag) ? ' active' : '');
          d.textContent = tag;
          d.onclick = function() {
            if (selected.has(tag)) { selected.delete(tag); }
            else { selected.add(tag); }
            d.classList.toggle('active');
          };
          grid.appendChild(d);
        });
        area.appendChild(grid);
      }

      // Other section
      if (!fl) {
        var otherH = document.createElement('div');
        otherH.className = 'other-header';
        otherH.style.margin = '16px 20px 8px';
        var title = document.createElement('span');
        title.className = 'category-title';
        title.style.margin = '0';
        title.textContent = '其他销售行业';
        var addBtn = document.createElement('button');
        addBtn.className = 'add-btn';
        addBtn.textContent = '+';
        otherH.appendChild(title);
        otherH.appendChild(addBtn);
        area.appendChild(otherH);

        var customBtn = document.createElement('button');
        customBtn.className = 'add-custom';
        customBtn.style.margin = '0 20px';
        customBtn.style.width = 'calc(100% - 40px)';
        customBtn.textContent = '都没找到？点击添加您的销售行业';
        area.appendChild(customBtn);
      }
    }

    function filterTags() {
      renderCategories(document.getElementById('searchInput').value);
    }

    renderCategories();
  </script>
</body>
</html>
