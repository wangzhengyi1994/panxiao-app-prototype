<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>磐销云输入法 - 登录</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; justify-content: center; min-height: 100vh; align-items: center; }
    .phone-frame { position: relative; width: 390px; max-width: 100vw; }
    .screen-img { width: 100%; display: block; }
    .hotspot { position: absolute; cursor: pointer; }
    @media (max-width: 430px) { .phone-frame { width: 100vw; } }
    /* Toast */
    .toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: rgba(0,0,0,.75); color: #fff; padding: 12px 28px; border-radius: 10px; font-size: 14px; z-index: 999; display: none; }
  </style>
</head>
<body>
  <div class="phone-frame">
    <img class="screen-img" src="assets/login.png">
    <!-- 获取验证码 -->
    <div class="hotspot" style="top:49.5%;left:70%;width:22%;height:4%;" onclick="sendCode()" id="codeArea"></div>
    <!-- 登录按钮 -->
    <div class="hotspot" style="top:56%;left:8%;width:84%;height:6%;" onclick="doLogin()"></div>
    <!-- 去注册 -->
    <div class="hotspot" style="top:63%;left:40%;width:25%;height:4%;" onclick="location.href='register.html'"></div>
  </div>
  <div class="toast" id="toast"></div>
  <script>
    var codeSent = false;
    function sendCode() {
      if (codeSent) return;
      codeSent = true;
      showToast('验证码已发送');
    }
    function doLogin() {
      location.href = 'app.html';
    }
    function showToast(msg) {
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.style.display = 'block';
      setTimeout(function() { t.style.display = 'none'; }, 1500);
    }
  </script>
</body>
</html>
