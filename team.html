<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>团队管理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#F5F7FA;font-family:-apple-system,'PingFang SC',system-ui,sans-serif;min-height:100vh;padding-bottom:40px}

.nav{background:#fff;height:50px;display:flex;align-items:center;justify-content:center;position:sticky;top:0;z-index:100;border-bottom:1px solid #F0F0F0}
.nav-back{position:absolute;left:12px;padding:8px;color:#333;background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:4px;font-size:15px;font-family:inherit}
.nav-title{font-size:17px;font-weight:600;color:#1A1A2E}

/* 团队概览卡 */
.team-hero{background:linear-gradient(135deg,#2D5BE3 0%,#3D8EFF 100%);margin:12px 16px;border-radius:16px;padding:18px 20px;color:#fff;position:relative;overflow:hidden}
.team-hero::before{content:'';position:absolute;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.07);top:-40px;right:-40px}
.team-hero::after{content:'';position:absolute;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.05);bottom:-20px;left:20px}
.th-name{font-size:18px;font-weight:700;margin-bottom:3px}
.th-desc{font-size:12px;opacity:.8;margin-bottom:16px}
.th-stats{display:flex;gap:24px;position:relative;z-index:1}
.th-stat{text-align:center}
.th-stat-num{font-size:22px;font-weight:700}
.th-stat-label{font-size:11px;opacity:.75;margin-top:1px}

/* Tab 筛选 */
.filter-bar{display:flex;background:#fff;border-bottom:1px solid #F0F0F0;position:sticky;top:50px;z-index:90}
.filter-tab{flex:1;height:42px;border:none;background:transparent;font-size:13px;font-weight:500;color:#8A8FA3;cursor:pointer;font-family:inherit;position:relative}
.filter-tab.active{color:#3D6EF5;font-weight:600}
.filter-tab.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;background:#3D6EF5;border-radius:2px}

/* 邀请按钮 */
.invite-strip{display:flex;align-items:center;justify-content:space-between;padding:12px 16px}
.invite-strip-left{font-size:13px;color:#606673}
.invite-strip-left span{color:#0C1428;font-weight:600}
.invite-btn{height:34px;padding:0 16px;border-radius:10px;background:#3D6EF5;color:#fff;font-size:13px;font-weight:600;border:none;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px}

/* 成员列表 */
.member-list{padding:0 16px;display:flex;flex-direction:column;gap:8px}
.member-card{background:#fff;border-radius:12px;padding:13px 14px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.member-avatar{width:42px;height:42px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;color:#fff;flex-shrink:0}
.member-info{flex:1;min-width:0}
.member-name-row{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.member-name{font-size:14px;font-weight:600;color:#0C1428}
.role-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:8px}
.role-admin{background:#EEF3FF;color:#3D6EF5}
.role-staff{background:#F3F4F6;color:#6B7280}
.member-phone{font-size:12px;color:#9EACBF}
.member-stats{display:flex;gap:12px;margin-top:5px}
.member-stat{font-size:11px;color:#8A8FA3}
.member-stat span{color:#0C1428;font-weight:600}
.member-action{padding:6px;color:#C0C8D8;cursor:pointer;background:none;border:none;flex-shrink:0}

/* 待审批 */
.pending-card{background:#fff;border-radius:12px;padding:13px 14px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.pending-info{flex:1}
.pending-name{font-size:14px;font-weight:600;color:#0C1428;margin-bottom:2px}
.pending-phone{font-size:12px;color:#9EACBF}
.pending-time{font-size:11px;color:#C0C8D8;margin-top:3px}
.pending-actions{display:flex;gap:8px}
.pa-btn{height:30px;padding:0 12px;border-radius:8px;font-size:12px;font-weight:600;border:none;cursor:pointer;font-family:inherit}
.pa-accept{background:#3D6EF5;color:#fff}
.pa-reject{background:#F5F7FA;color:#8A8FA3}

/* Sheet */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;opacity:0;pointer-events:none;transition:opacity .2s}
.sheet-overlay.show{opacity:1;pointer-events:auto}
.sheet{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:20px 20px 0 0;padding:20px 16px 44px;transform:translateY(100%);transition:transform .3s;z-index:201}
.sheet.show{transform:translateY(0)}
.sheet-title{font-size:16px;font-weight:700;color:#0C1428;margin-bottom:4px}
.sheet-desc{font-size:13px;color:#8A8FA3;margin-bottom:18px}
.sheet-label{font-size:12px;color:#606673;margin-bottom:6px;font-weight:500}
.sheet-input{width:100%;height:46px;border:1.5px solid #EAECF0;border-radius:12px;padding:0 14px;font-size:15px;font-family:inherit;outline:none;color:#0C1428;background:#fff}
.sheet-input:focus{border-color:#3D6EF5}
.role-selector{display:flex;gap:10px;margin:14px 0}
.role-opt{flex:1;height:46px;border-radius:12px;border:1.5px solid #EAECF0;background:#fff;font-size:13px;font-weight:500;color:#8A8FA3;cursor:pointer;font-family:inherit;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.role-opt.selected{border-color:#3D6EF5;background:#EEF3FF;color:#3D6EF5;font-weight:600}
.sheet-row{display:flex;gap:10px;margin-top:18px}
.sheet-cancel{flex:1;height:46px;border-radius:12px;border:1px solid #E0E0E0;background:#fff;font-size:15px;color:#666;cursor:pointer;font-family:inherit}
.sheet-save{flex:2;height:46px;border-radius:12px;border:none;background:#3D6EF5;color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}

/* 操作菜单 sheet */
.action-list{padding:4px 0 0}
.action-item{display:flex;align-items:center;gap:12px;padding:14px 4px;border-bottom:1px solid #F5F7FA;cursor:pointer}
.action-item:last-child{border-bottom:none}
.action-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.action-text{font-size:15px;color:#0C1428}
.action-text.danger{color:#FF3B30}

/* 链接邀请 */
.invite-link-box{background:#F5F7FA;border-radius:12px;padding:12px 14px;margin:12px 0;display:flex;align-items:center;gap:10px}
.invite-link-url{font-size:12px;color:#606673;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.copy-link-btn{height:30px;padding:0 12px;border-radius:8px;background:#3D6EF5;color:#fff;font-size:12px;font-weight:600;border:none;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="nav">
  <button class="nav-back" onclick="history.back()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    返回
  </button>
  <span class="nav-title">团队管理</span>
</div>

<!-- 团队概览 -->
<div class="team-hero">
  <div class="th-name">磐销云销售团队</div>
  <div class="th-desc">管理员视角</div>
  <div class="th-stats">
    <div class="th-stat">
      <div class="th-stat-num" id="statTotal">8</div>
      <div class="th-stat-label">全部成员</div>
    </div>
    <div class="th-stat">
      <div class="th-stat-num">2</div>
      <div class="th-stat-label">管理员</div>
    </div>
    <div class="th-stat">
      <div class="th-stat-num" id="statPending">1</div>
      <div class="th-stat-label">待审批</div>
    </div>
  </div>
</div>

<!-- Tab -->
<div class="filter-bar">
  <button class="filter-tab active" id="tab-members" onclick="switchTab('members')">全部成员</button>
  <button class="filter-tab" id="tab-pending" onclick="switchTab('pending')">
    待审批
    <span id="pendingBadge" style="display:inline-block;background:#FF3B30;color:#fff;font-size:10px;font-weight:700;padding:0 5px;border-radius:8px;margin-left:4px;vertical-align:middle">1</span>
  </button>
</div>

<!-- 全部成员面板 -->
<div id="panel-members">
  <div class="invite-strip">
    <div class="invite-strip-left">共 <span id="memberCount">8</span> 位成员</div>
    <button class="invite-btn" onclick="openInviteSheet()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/></svg>
      邀请成员
    </button>
  </div>
  <div class="member-list" id="memberList"></div>
</div>

<!-- 待审批面板 -->
<div id="panel-pending" style="display:none">
  <div class="invite-strip">
    <div class="invite-strip-left">待确认 <span>1</span> 人</div>
  </div>
  <div class="member-list">
    <div class="pending-card">
      <div class="member-avatar" style="background:linear-gradient(135deg,#F59E0B,#FBBF24)">陈</div>
      <div class="pending-info">
        <div class="pending-name">陈志远</div>
        <div class="pending-phone">135-7788-0099</div>
        <div class="pending-time">通过邀请链接申请加入 · 5分钟前</div>
      </div>
      <div class="pending-actions">
        <button class="pa-btn pa-reject" onclick="handlePending(this,'reject')">拒绝</button>
        <button class="pa-btn pa-accept" onclick="handlePending(this,'accept')">通过</button>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- 邀请 Sheet -->
<div class="sheet-overlay" id="inviteOverlay" onclick="closeInviteSheet()"></div>
<div class="sheet" id="inviteSheet">
  <div class="sheet-title">邀请成员</div>
  <div class="sheet-desc">通过手机号邀请，或分享邀请链接</div>

  <!-- 邀请链接 -->
  <div class="invite-link-box">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71" stroke="#3D6EF5" stroke-width="1.8" stroke-linecap="round"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71" stroke="#3D6EF5" stroke-width="1.8" stroke-linecap="round"/></svg>
    <span class="invite-link-url">https://panxiao.app/join/TK-2026-X9</span>
    <button class="copy-link-btn" onclick="copyLink()">复制链接</button>
  </div>

  <div class="sheet-label" style="margin-top:4px">或输入手机号邀请</div>
  <input class="sheet-input" type="tel" id="invitePhone" placeholder="输入对方手机号">

  <div class="sheet-label" style="margin-top:14px">设置角色</div>
  <div class="role-selector">
    <button class="role-opt selected" id="roleStaff" onclick="selectRole('staff')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.8"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      普通员工
    </button>
    <button class="role-opt" id="roleAdmin" onclick="selectRole('admin')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      管理员
    </button>
  </div>

  <div class="sheet-row">
    <button class="sheet-cancel" onclick="closeInviteSheet()">取消</button>
    <button class="sheet-save" onclick="sendInvite()">发送邀请</button>
  </div>
</div>

<!-- 成员操作 Sheet -->
<div class="sheet-overlay" id="actionOverlay" onclick="closeActionSheet()"></div>
<div class="sheet" id="actionSheet">
  <div class="sheet-title" id="actionTarget">成员操作</div>
  <div class="action-list">
    <div class="action-item" onclick="toggleRole()">
      <div class="action-icon" style="background:#EEF3FF">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" stroke="#3D6EF5" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <span class="action-text" id="toggleRoleText">设为管理员</span>
    </div>
    <div class="action-item" onclick="viewRecords()">
      <div class="action-icon" style="background:#E8F8EF">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" stroke="#07A854" stroke-width="1.8" stroke-linecap="round"/></svg>
      </div>
      <span class="action-text">查看跟进记录</span>
    </div>
    <div class="action-item" onclick="removeMember()">
      <div class="action-icon" style="background:#FFF0EE">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" stroke="#FF3B30" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <span class="action-text danger">移出团队</span>
    </div>
  </div>
</div>

<script>
var avatarColors = ['#3D6EF5','#07A854','#E07A00','#9B6BFF','#E91E8C','#00B4D8','#F59E0B','#16A34A'];
var members = [
  { id:1, name:'张小慧', phone:'138-0012-3456', role:'admin', followCount:18, lastActive:'今天', color:'#3D6EF5' },
  { id:2, name:'刘城',   phone:'135-8899-2200', role:'admin', followCount:12, lastActive:'今天', color:'#9B6BFF' },
  { id:3, name:'郑浩',   phone:'139-7788-5544', role:'staff', followCount:9,  lastActive:'今天', color:'#07A854' },
  { id:4, name:'林琳',   phone:'137-1234-5678', role:'staff', followCount:7,  lastActive:'昨天', color:'#E91E8C' },
  { id:5, name:'杨牧青', phone:'136-0088-7766', role:'staff', followCount:5,  lastActive:'2天前', color:'#E07A00' },
  { id:6, name:'李木木', phone:'138-5566-9900', role:'staff', followCount:11, lastActive:'今天', color:'#00B4D8' },
  { id:7, name:'王林玲', phone:'133-2200-4455', role:'staff', followCount:8,  lastActive:'今天', color:'#F59E0B' },
  { id:8, name:'吴大壮', phone:'131-8877-3344', role:'staff', followCount:6,  lastActive:'昨天', color:'#16A34A' },
];
var currentTab = 'members';
var selectedMemberId = null;
var selectedRole = 'staff';

function renderMembers() {
  document.getElementById('memberCount').textContent = members.length;
  document.getElementById('statTotal').textContent = members.length;
  document.getElementById('memberList').innerHTML = members.map(function(m) {
    var isAdmin = m.role === 'admin';
    return '<div class="member-card">'
      + '<div class="member-avatar" style="background:'+m.color+'">'+m.name.charAt(0)+'</div>'
      + '<div class="member-info">'
      +   '<div class="member-name-row">'
      +     '<span class="member-name">'+m.name+'</span>'
      +     '<span class="role-badge '+(isAdmin?'role-admin':'role-staff')+'">'+(isAdmin?'管理员':'员工')+'</span>'
      +   '</div>'
      +   '<div class="member-phone">'+m.phone+'</div>'
      +   '<div class="member-stats">'
      +     '<span class="member-stat">跟进 <span>'+m.followCount+'</span> 条</span>'
      +     '<span class="member-stat">活跃 <span>'+m.lastActive+'</span></span>'
      +   '</div>'
      + '</div>'
      + '<button class="member-action" onclick="openActionSheet('+m.id+')">'
      +   '<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="5" r="1.5" fill="#C0C8D8"/><circle cx="12" cy="12" r="1.5" fill="#C0C8D8"/><circle cx="12" cy="19" r="1.5" fill="#C0C8D8"/></svg>'
      + '</button>'
      + '</div>';
  }).join('');
}
renderMembers();

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-members').classList.toggle('active', tab === 'members');
  document.getElementById('tab-pending').classList.toggle('active', tab === 'pending');
  document.getElementById('panel-members').style.display = tab === 'members' ? '' : 'none';
  document.getElementById('panel-pending').style.display = tab === 'pending' ? '' : 'none';
}

// 邀请 Sheet
function openInviteSheet() {
  document.getElementById('inviteOverlay').classList.add('show');
  document.getElementById('inviteSheet').classList.add('show');
  setTimeout(function(){ document.getElementById('invitePhone').focus(); }, 300);
}
function closeInviteSheet() {
  document.getElementById('inviteOverlay').classList.remove('show');
  document.getElementById('inviteSheet').classList.remove('show');
  document.getElementById('invitePhone').value = '';
  selectRole('staff');
}
function selectRole(r) {
  selectedRole = r;
  document.getElementById('roleStaff').classList.toggle('selected', r === 'staff');
  document.getElementById('roleAdmin').classList.toggle('selected', r === 'admin');
}
function copyLink() {
  navigator.clipboard.writeText('https://panxiao.app/join/TK-2026-X9').catch(function(){});
  showToast('邀请链接已复制');
}
function sendInvite() {
  var phone = document.getElementById('invitePhone').value.trim();
  if (!phone) { showToast('请输入手机号'); return; }
  closeInviteSheet();
  showToast('邀请已发送至 ' + phone);
}

// 成员操作 Sheet
function openActionSheet(id) {
  selectedMemberId = id;
  var m = members.find(function(x){ return x.id === id; });
  if (!m) return;
  document.getElementById('actionTarget').textContent = m.name;
  document.getElementById('toggleRoleText').textContent = m.role === 'admin' ? '降为普通员工' : '设为管理员';
  document.getElementById('actionOverlay').classList.add('show');
  document.getElementById('actionSheet').classList.add('show');
}
function closeActionSheet() {
  document.getElementById('actionOverlay').classList.remove('show');
  document.getElementById('actionSheet').classList.remove('show');
}
function toggleRole() {
  var m = members.find(function(x){ return x.id === selectedMemberId; });
  if (!m) return;
  m.role = m.role === 'admin' ? 'staff' : 'admin';
  renderMembers();
  closeActionSheet();
  showToast(m.name + ' 已' + (m.role === 'admin' ? '设为管理员' : '降为普通员工'));
}
function viewRecords() {
  closeActionSheet();
  showToast('即将上线：查看该成员跟进记录');
}
function removeMember() {
  var m = members.find(function(x){ return x.id === selectedMemberId; });
  if (!m) return;
  members = members.filter(function(x){ return x.id !== selectedMemberId; });
  renderMembers();
  closeActionSheet();
  showToast(m.name + ' 已移出团队');
}

// 待审批
function handlePending(btn, action) {
  var card = btn.closest('.pending-card');
  if (action === 'accept') {
    card.remove();
    document.getElementById('statPending').textContent = '0';
    document.getElementById('pendingBadge').style.display = 'none';
    showToast('已通过申请，成员已加入团队');
  } else {
    card.remove();
    document.getElementById('statPending').textContent = '0';
    document.getElementById('pendingBadge').style.display = 'none';
    showToast('已拒绝申请');
  }
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2000);
}
</script>
</body>
</html>
