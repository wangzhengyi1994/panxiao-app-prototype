<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>粘贴板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#F5F7FA;font-family:-apple-system,'PingFang SC',system-ui,sans-serif;min-height:100vh}
.nav{background:#fff;height:50px;display:flex;align-items:center;justify-content:center;border-bottom:1px solid #F0F0F0;position:sticky;top:0;z-index:100}
.nav-back{position:absolute;left:12px;padding:8px;color:#333;background:none;border:none;cursor:pointer;display:flex;align-items:center}
.nav-back svg{width:20px;height:20px}
.nav-title{font-size:17px;font-weight:600;color:#1A1A2E}
.nav-clear{position:absolute;right:16px;color:#999;font-size:14px;background:none;border:none;cursor:pointer;font-family:inherit}
.list{padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.item{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.item-main{padding:12px 14px;cursor:pointer}
.item-row1{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.item-source{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500;flex-shrink:0}
.src-wx{background:#E8F8EF;color:#07A854}
.src-input{background:#E8F0FF;color:#3D6EF5}
.src-copy{background:#FFF4E8;color:#E07A00}
.src-search{background:#F5EEFF;color:#8B5CF6}
.item-time{font-size:11px;color:#B0B7C3;margin-left:auto}
.item-content{font-size:14px;color:#1A1A2E;line-height:1.6;overflow:hidden;transition:max-height .25s;max-height:44px}
.item-content.expanded{max-height:300px}
.item-foot{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-top:1px solid #F5F7FA}
.item-foot-left{font-size:12px;color:#B0B7C3}
.copy-btn{font-size:13px;color:#3D6EF5;background:none;border:none;cursor:pointer;font-family:inherit;font-weight:500;padding:4px 10px;border-radius:8px;background:#EEF3FF}
.del-btn{font-size:13px;color:#FF3B30;background:none;border:none;cursor:pointer;font-family:inherit;padding:4px 10px;border-radius:8px;background:#FFF0EF}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;text-align:center}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:.3}
.empty-text{font-size:14px;color:#B0B7C3}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:999}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="nav">
  <button class="nav-back" onclick="history.back()"><svg viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
  <span class="nav-title">粘贴板</span>
  <button class="nav-clear" onclick="clearAll()">清空</button>
</div>
<div id="main"></div>
<div class="toast" id="toast">已复制</div>
<script>
const defaultItems=[
  {id:1,src:'wx',text:'您好，我们公司最近在做一个AI销售助手的项目，想了解一下磐销云的合作方案，请问有相关负责人可以联系吗？',time:'2分钟前'},
  {id:2,src:'copy',text:'https://www.panxiaoyun.com/activity/2024spring?source=sales&utm_campaign=q1',time:'8分钟前'},
  {id:3,src:'input',text:'已全面接入DeepSeek R1模型，话术生成更智能、更自然',time:'23分钟前'},
  {id:4,src:'search',text:'138-0012-3456',time:'1小时前'},
  {id:5,src:'wx',text:'好的，周三下午两点我这边可以安排一个30分钟的产品演示，届时我们的产品总监也会参加，到时候可以深入交流一下。',time:'2小时前'},
  {id:6,src:'copy',text:'2024年Q1销售数据汇总：总成交额382万，同比增长27%，团队人均产出15.3万，最高单月成交王：李明58万',time:'3小时前'},
  {id:7,src:'input',text:'亲爱的各位同学，明天（周二）下午3点在2楼会议室有一场产品培训，请准时参加，不得迟到！',time:'昨天 18:32'},
  {id:8,src:'wx',text:'价格这边能不能再优惠一点？我们公司有30个销售的名额，如果价格合适的话可以直接签年费。',time:'昨天 15:20'},
  {id:9,src:'search',text:'磐销云输入法 vs 销售易 对比评测 2024年最新版本',time:'昨天 11:05'},
  {id:10,src:'copy',text:'【重要通知】本月底前完成目标的同学，可以额外获得1000元奖金，请大家加油冲刺！截止时间：3月31日23:59',time:'前天 09:10'},
];
const srcMap={wx:{label:'微信',cls:'src-wx'},copy:{label:'复制',cls:'src-copy'},input:{label:'输入框',cls:'src-input'},search:{label:'搜索',cls:'src-search'}};
let items=JSON.parse(localStorage.getItem('panxiao_clipboard')||'null')||defaultItems;
function render(){
  const main=document.getElementById('main');
  if(items.length===0){main.innerHTML='<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">暂无剪贴记录</div></div>';return;}
  main.innerHTML='<div class="list">'+items.map((it,i)=>{
    const s=srcMap[it.src]||{label:'其他',cls:'src-copy'};
    return `<div class="item">
      <div class="item-main" onclick="toggle(${i})">
        <div class="item-row1"><span class="item-source ${s.cls}">${s.label}</span><span class="item-time">${it.time}</span></div>
        <div class="item-content" id="ic${i}">${it.text}</div>
      </div>
      <div class="item-foot">
        <span class="item-foot-left">${it.text.length}字</span>
        <div style="display:flex;gap:6px">
          <button class="del-btn" onclick="delItem(${i})">删除</button>
          <button class="copy-btn" onclick="copyItem('${it.text.replace(/'/g,"\\'")}')">复制</button>
        </div>
      </div>
    </div>`;
  }).join('')+'</div>';
}
function toggle(i){document.getElementById('ic'+i).classList.toggle('expanded');}
function copyItem(t){
  navigator.clipboard.writeText(t).catch(()=>{});
  const toast=document.getElementById('toast');toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1500);
}
function delItem(i){items.splice(i,1);localStorage.setItem('panxiao_clipboard',JSON.stringify(items));render();}
function clearAll(){
  if(confirm('确定清空所有剪贴记录吗？')){items=[];localStorage.removeItem('panxiao_clipboard');render();}
}
render();
</script>
</body>
</html>
