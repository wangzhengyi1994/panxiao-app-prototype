<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>团队图库</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#F5F7FA;font-family:-apple-system,'PingFang SC',system-ui,sans-serif;min-height:100vh}
.nav{background:#fff;height:50px;display:flex;align-items:center;justify-content:center;border-bottom:1px solid #F0F0F0;position:sticky;top:0;z-index:100}
.nav-back{position:absolute;left:12px;padding:8px;color:#333;background:none;border:none;cursor:pointer;display:flex;align-items:center}
.nav-back svg{width:20px;height:20px}
.nav-title{font-size:17px;font-weight:600;color:#1A1A2E}
.nav-upload{position:absolute;right:16px;color:#3D6EF5;font-size:14px;font-weight:500;background:none;border:none;cursor:pointer;font-family:inherit}
.search-wrap{background:#fff;padding:10px 16px;border-bottom:1px solid #F0F0F0}
.search-box{background:#F5F7FA;border-radius:20px;height:34px;display:flex;align-items:center;padding:0 12px;gap:8px}
.search-box input{background:none;border:none;outline:none;flex:1;font-size:13px;color:#333}
.tabs-wrap{background:#fff;border-bottom:1px solid #F0F0F0;overflow-x:auto;scrollbar-width:none}
.tabs-wrap::-webkit-scrollbar{display:none}
.tabs{display:flex;padding:0 8px;white-space:nowrap}
.tab{padding:10px 14px;font-size:14px;color:#8A8FA3;cursor:pointer;border:none;background:none;font-family:inherit;flex-shrink:0;position:relative;transition:color .15s}
.tab.active{color:#3D6EF5;font-weight:600}
.tab.active::after{content:'';position:absolute;bottom:0;left:20%;width:60%;height:2px;background:#3D6EF5;border-radius:1px}
.grid{padding:12px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
.img-card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.img-block{width:100%;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;position:relative}
.img-name{position:absolute;bottom:8px;left:8px;right:8px;font-size:11px;color:rgba(255,255,255,.9);font-weight:500;text-shadow:0 1px 3px rgba(0,0,0,.4)}
.img-foot{display:flex;align-items:center;justify-content:space-between;padding:8px 10px}
.img-size{font-size:11px;color:#B0B7C3}
.dl-btn{background:none;border:none;cursor:pointer;color:#3D6EF5;padding:4px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:999}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="nav">
  <button class="nav-back" onclick="history.back()"><svg viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
  <span class="nav-title">团队图库</span>
  <button class="nav-upload" onclick="toast2('功能开发中，敬请期待')">+ 上传</button>
</div>
<div class="search-wrap">
  <div class="search-box">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="#999" stroke-width="2"/><path d="M21 21l-4.35-4.35" stroke="#999" stroke-width="2" stroke-linecap="round"/></svg>
    <input type="text" placeholder="搜索图片">
  </div>
</div>
<div class="tabs-wrap">
  <div class="tabs">
    <button class="tab active" onclick="switchTab(this,'all')">全部</button>
    <button class="tab" onclick="switchTab(this,'product')">产品图</button>
    <button class="tab" onclick="switchTab(this,'activity')">活动图</button>
    <button class="tab" onclick="switchTab(this,'poster')">海报</button>
    <button class="tab" onclick="switchTab(this,'sns')">朋友圈素材</button>
  </div>
</div>
<div class="grid" id="grid"></div>
<div class="toast" id="toast">已保存到相册</div>
<script>
const imgs=[
  {cat:'product',name:'产品主图-白色版',size:'1920×1080',gradient:'linear-gradient(135deg,#3D6EF5,#6B9FFF)',ratio:'4/3'},
  {cat:'product',name:'功能展示图-深色',size:'1080×1080',gradient:'linear-gradient(135deg,#1A1A2E,#3D6EF5)',ratio:'1/1'},
  {cat:'product',name:'产品对比图',size:'1600×900',gradient:'linear-gradient(135deg,#667eea,#764ba2)',ratio:'16/9'},
  {cat:'activity',name:'618大促活动图',size:'750×1334',gradient:'linear-gradient(135deg,#FF6B6B,#FFE66D)',ratio:'3/4'},
  {cat:'activity',name:'年终庆典Banner',size:'1200×400',gradient:'linear-gradient(135deg,#F7971E,#FFD200)',ratio:'3/1'},
  {cat:'activity',name:'春季活动弹窗',size:'600×800',gradient:'linear-gradient(135deg,#43E97B,#38F9D7)',ratio:'3/4'},
  {cat:'poster',name:'新春促销海报',size:'750×1000',gradient:'linear-gradient(135deg,#E53935,#FF8A65)',ratio:'3/4'},
  {cat:'poster',name:'品牌发布会海报',size:'900×1200',gradient:'linear-gradient(135deg,#1A1A2E,#7B2FBE)',ratio:'3/4'},
  {cat:'poster',name:'招募合伙人海报',size:'750×1000',gradient:'linear-gradient(135deg,#0F2027,#203A43,#2C5364)',ratio:'3/4'},
  {cat:'sns',name:'朋友圈客户证言',size:'750×750',gradient:'linear-gradient(135deg,#FC466B,#3F5EFB)',ratio:'1/1'},
  {cat:'sns',name:'产品功能九宫格',size:'750×750',gradient:'linear-gradient(135deg,#11998E,#38EF7D)',ratio:'1/1'},
  {cat:'sns',name:'销售成绩喜报',size:'750×750',gradient:'linear-gradient(135deg,#F953C6,#B91D73)',ratio:'1/1'},
];
let current='all';
function render(){
  const list=imgs.filter(i=>current==='all'||i.cat===current);
  document.getElementById('grid').innerHTML=list.map(img=>`
    <div class="img-card">
      <div class="img-block" style="aspect-ratio:${img.ratio};background:${img.gradient}">
        <span class="img-name">${img.name}</span>
      </div>
      <div class="img-foot">
        <span class="img-size">${img.size}</span>
        <button class="dl-btn" onclick="dl()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </div>`).join('');
}
function switchTab(el,cat){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');current=cat;render();}
function dl(){toast2('已保存到相册');}
function toast2(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800);}
render();
</script>
</body>
</html>
