<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>磐销云输入法 - 完善信息</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, 'PingFang SC', 'SF Pro Display', system-ui, sans-serif;
    }
    .phone {
      width: 375px;
      min-height: 100vh;
      background: #fff;
      position: relative;
      display: flex;
      flex-direction: column;
    }
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 24px 0;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
    }
    .status-icons { display: flex; gap: 6px; align-items: center; }
    .status-icons svg { width: 16px; height: 16px; }

    .header {
      background: linear-gradient(180deg, #1B6EF3, #1558D6);
      height: 220px;
      border-radius: 0 0 30px 30px;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
      padding: 50px 20px 20px;
    }
    .back-btn {
      position: absolute;
      top: 50px;
      left: 16px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      z-index: 5;
    }
    .back-btn svg { width: 24px; height: 24px; }

    .progress-bar {
      display: flex;
      gap: 6px;
      margin-top: 16px;
      margin-bottom: 20px;
      padding: 0 30px;
    }
    .progress-bar .seg {
      flex: 1;
      height: 3px;
      border-radius: 2px;
      background: rgba(255,255,255,0.4);
    }
    .progress-bar .seg.active { background: #fff; }

    .header-text {
      position: absolute;
      bottom: 30px;
      left: 20px;
    }
    .header-text h1 {
      color: #fff;
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 6px;
    }
    .header-text p {
      color: #fff;
      font-size: 15px;
      opacity: 0.9;
    }
    .header-character {
      position: absolute;
      right: -10px;
      bottom: 0;
      height: 160px;
    }

    .form-area {
      padding: 24px 20px;
      flex: 1;
    }
    .field-label {
      font-size: 14px;
      color: #333;
      margin-bottom: 8px;
      display: block;
    }
    .field-label .required { color: #FF4444; margin-left: 2px; }
    .field-input {
      width: 100%;
      height: 52px;
      background: #F5F6FA;
      border: 2px solid transparent;
      border-radius: 12px;
      padding: 0 14px;
      font-size: 15px;
      color: #1A1A1A;
      outline: none;
      margin-bottom: 20px;
      font-family: inherit;
      transition: all 0.2s;
    }
    .field-input:focus {
      background: #fff;
      border-color: #3D6EF5;
    }
    .field-input::placeholder { color: #BBBBBB; }
    .field-textarea {
      width: 100%;
      height: 100px;
      background: #F5F6FA;
      border: 2px solid transparent;
      border-radius: 12px;
      padding: 14px;
      font-size: 15px;
      color: #1A1A1A;
      outline: none;
      resize: none;
      margin-bottom: 20px;
      font-family: inherit;
      transition: all 0.2s;
    }
    .field-textarea:focus {
      background: #fff;
      border-color: #3D6EF5;
    }
    .field-textarea::placeholder { color: #BBBBBB; }

    .bottom-btn {
      position: fixed;
      bottom: 0;
      width: 375px;
      padding: 12px 20px 28px;
      background: #fff;
    }
    .bottom-btn button {
      width: 100%;
      height: 52px;
      background: #3D6EF5;
      border: none;
      border-radius: 14px;
      color: #FFF;
      font-size: 18px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
    }
    .bottom-btn button:active { opacity: 0.85; }

    @media (max-width: 430px) {
      .phone { width: 100%; }
      .bottom-btn { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="status-bar">
      <span>9:41</span>
      <div class="status-icons">
        <svg viewBox="0 0 16 16" fill="white"><path d="M1 10h2v4H1zM5 7h2v7H5zM9 4h2v10H9zM13 1h2v13h-2z"/></svg>
        <svg viewBox="0 0 16 16" fill="white"><path d="M8 3C5.5 3 3.3 4 1.7 5.7l1.4 1.4C4.5 5.7 6.2 5 8 5s3.5.7 4.9 2.1l1.4-1.4C12.7 4 10.5 3 8 3zm0 4c-1.5 0-2.8.6-3.8 1.5L5.6 10c.7-.7 1.5-1 2.4-1s1.7.3 2.4 1l1.4-1.5C10.8 7.6 9.5 7 8 7zm0 4c-.6 0-1.1.2-1.5.6L8 13.5l1.5-1.9c-.4-.4-.9-.6-1.5-.6z"/></svg>
        <svg viewBox="0 0 24 16" fill="white"><rect x="0" y="2" width="20" height="12" rx="2" stroke="white" stroke-width="1.5" fill="none"/><rect x="2" y="4" width="14" height="8" rx="1" fill="white"/><rect x="21" y="5" width="3" height="6" rx="1" fill="white" opacity="0.4"/></svg>
      </div>
    </div>

    <div class="header">
      <button class="back-btn" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <div class="progress-bar">
        <div class="seg active"></div>
        <div class="seg active"></div>
        <div class="seg"></div>
        <div class="seg"></div>
      </div>
      <div class="header-text">
        <h1>属于你的专属个人智能体</h1>
        <p>请完善【个人信息】</p>
      </div>
      <img class="header-character" src="assets/login_character.png" alt="3D人物">
    </div>

    <div class="form-area">
      <label class="field-label">姓名<span class="required">*</span></label>
      <input class="field-input" type="text" placeholder="例:张明">

      <label class="field-label">职位</label>
      <input class="field-input" type="text" placeholder="例:市场总监">

      <label class="field-label">个人亮点</label>
      <textarea class="field-textarea" placeholder="例:10年快消品行业营销经验..."></textarea>
    </div>

    <div class="bottom-btn">
      <button onclick="location.href='app.html'">下一步</button>
    </div>
  </div>
</body>
</html>
